name: Fetch VIX

on:
  schedule:
    # Every 30 min, Mon-Fri, 13:30–20:00 UTC (9:30 AM–4:00 PM ET)
    - cron: '30 13 * * 1-5'
    - cron: '0,30 14-19 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  vix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch VIX
        run: python scripts/fetch_vix.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vix.json
          git diff --staged --quiet || git commit -m "chore: update VIX"
          git push

      - name: Trigger site redeploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
